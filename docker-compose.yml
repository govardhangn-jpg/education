version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: samarthaa_mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: samarthaa
    networks:
      - samarthaa_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: samarthaa_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/samarthaa
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
    depends_on:
      - mongodb
    networks:
      - samarthaa_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: samarthaa_client
    restart: always
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=/api
    depends_on:
      - server
    networks:
      - samarthaa_net

volumes:
  mongo_data:

networks:
  samarthaa_net:
    driver: bridge
