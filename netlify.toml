# Place this file at the ROOT of your repo (same level as client/ and server/)

[build]
  base    = "client"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION          = "18"
  GENERATE_SOURCEMAP    = "false"
  DISABLE_ESLINT_PLUGIN = "true"

# Disable post-processing features that cause the spinner to hang
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle   = false
  minify   = false

[build.processing.js]
  bundle   = false
  minify   = false

[build.processing.html]
  pretty_urls = false

[build.processing.images]
  compress = false

# SPA redirect — all React Router routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
